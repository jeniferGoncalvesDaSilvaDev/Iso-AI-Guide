# Render Blueprint — deploy em 1 clique
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: iso-ai-guide
    env: node
    region: ohio
    plan: free
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      cd artifacts/iso-saas && pnpm run build
      cd ../api-server && pnpm run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: BASE_PATH
        value: "/"
      - key: DATABASE_URL
        fromDatabase:
          name: iso-ai-guide-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: iso-ai-guide-db
    region: ohio
    plan: free
    databaseName: iso_guide
    ipAllowList: []
