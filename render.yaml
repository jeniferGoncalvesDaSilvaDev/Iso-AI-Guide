services:
  - type: web
    name: iso-ai-guide
    env: node
    region: ohio
    plan: free
    buildCommand: |
      pnpm install --frozen-lockfile 2>&1
      BASE_PATH=/ PORT=5173 pnpm --filter @workspace/iso-saas run build 2>&1
      pnpm --filter @workspace/api-server run build 2>&1
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: BASE_PATH
        value: "/"
      - key: DATABASE_URL
        fromDatabase:
          name: iso-ai-guide-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: iso-ai-guide-db
    region: ohio
    plan: free
    databaseName: iso_guide
    ipAllowList: []
