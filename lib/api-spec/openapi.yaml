openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ISO SaaS - Plataforma de Gestão ISO com IA
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Autenticação
  - name: companies
    description: Empresas
  - name: standards
    description: Normas ISO
  - name: diagnostics
    description: Diagnósticos
  - name: documents
    description: Documentos
  - name: chat
    description: Chat com IA
  - name: dashboard
    description: Dashboard
  - name: audit
    description: Auditoria

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- AUTH ---
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Registrar novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email já cadastrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login realizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Renovar token de acesso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Token renovado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Token inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout do usuário
      responses:
        "204":
          description: Logout realizado

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Perfil do usuário autenticado
      responses:
        "200":
          description: Perfil do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # --- COMPANIES ---
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: Listar empresas
      responses:
        "200":
          description: Lista de empresas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Criar empresa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Empresa criada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Buscar empresa por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Empresa encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Empresa não encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Atualizar empresa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Empresa atualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    delete:
      operationId: deleteCompany
      tags: [companies]
      summary: Remover empresa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Empresa removida

  # --- STANDARDS ---
  /standards:
    get:
      operationId: listStandards
      tags: [standards]
      summary: Listar normas ISO disponíveis
      responses:
        "200":
          description: Lista de normas ISO
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Standard"

  /companies/{id}/standards:
    get:
      operationId: getCompanyStandards
      tags: [standards]
      summary: Normas selecionadas pela empresa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Normas da empresa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Standard"
    post:
      operationId: selectCompanyStandards
      tags: [standards]
      summary: Selecionar normas para a empresa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandardSelection"
      responses:
        "200":
          description: Normas selecionadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Standard"

  # --- DIAGNOSTICS ---
  /diagnostics:
    post:
      operationId: createDiagnostic
      tags: [diagnostics]
      summary: Gerar diagnóstico organizacional com IA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosticInput"
      responses:
        "201":
          description: Diagnóstico gerado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnostic"
    get:
      operationId: listDiagnostics
      tags: [diagnostics]
      summary: Listar diagnósticos
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista de diagnósticos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Diagnostic"

  /diagnostics/{id}:
    get:
      operationId: getDiagnostic
      tags: [diagnostics]
      summary: Buscar diagnóstico por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diagnóstico encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnostic"
        "404":
          description: Diagnóstico não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # --- DOCUMENTS ---
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: Listar documentos
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
        - name: standardId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista de documentos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents/generate:
    post:
      operationId: generateDocuments
      tags: [documents]
      summary: Gerar documentos com IA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDocumentsInput"
      responses:
        "202":
          description: Geração iniciada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatus"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Buscar documento por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Documento encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Documento não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Atualizar documento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Documento atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Remover documento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Documento removido

  /documents/{id}/revisions:
    get:
      operationId: getDocumentRevisions
      tags: [documents]
      summary: Histórico de revisões do documento
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revisões do documento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentRevision"

  /documents/{id}/download:
    post:
      operationId: downloadDocument
      tags: [documents]
      summary: Baixar documento em PDF/DOCX
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadInput"
      responses:
        "200":
          description: URL de download
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadResponse"

  # --- CHAT ---
  /chat/messages:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Enviar mensagem para o assistente IA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Resposta do assistente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chat/history:
    get:
      operationId: getChatHistory
      tags: [chat]
      summary: Histórico de conversas
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Histórico de mensagens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"

  # --- DASHBOARD ---
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Resumo do dashboard
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Resumo do dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Atividade recente
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Atividade recente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/document-stats:
    get:
      operationId: getDocumentStats
      tags: [dashboard]
      summary: Estatísticas de documentos por norma
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Estatísticas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentStat"

  # --- AUDIT ---
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: Listar logs de auditoria
      parameters:
        - name: companyId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Logs de auditoria
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # AUTH SCHEMAS
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        companyName:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [user, accessToken, refreshToken]
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
        refreshToken:
          type: string

    TokenPair:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user, viewer]
        companyId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # COMPANY SCHEMAS
    Company:
      type: object
      required: [id, name, sector, size, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        sector:
          type: string
        size:
          type: string
          enum: [micro, pequena, media, grande]
        activity:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        cnpj:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CompanyInput:
      type: object
      required: [name, sector, size]
      properties:
        name:
          type: string
          minLength: 2
        sector:
          type: string
        size:
          type: string
          enum: [micro, pequena, media, grande]
        activity:
          type: string
        description:
          type: string
        cnpj:
          type: string
        phone:
          type: string
        address:
          type: string

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        sector:
          type: string
        size:
          type: string
          enum: [micro, pequena, media, grande]
        activity:
          type: string
        description:
          type: string
        phone:
          type: string
        address:
          type: string

    # STANDARDS SCHEMAS
    Standard:
      type: object
      required: [id, code, name, description, category]
      properties:
        id:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        benefits:
          type: array
          items:
            type: string
        applicableSectors:
          type: array
          items:
            type: string

    StandardSelection:
      type: object
      required: [standardIds]
      properties:
        standardIds:
          type: array
          items:
            type: string

    # DIAGNOSTIC SCHEMAS
    DiagnosticInput:
      type: object
      required: [companyId]
      properties:
        companyId:
          type: string
        additionalInfo:
          type: string

    Diagnostic:
      type: object
      required: [id, companyId, status, createdAt]
      properties:
        id:
          type: string
        companyId:
          type: string
        status:
          type: string
          enum: [generating, completed, failed]
        organizationalContext:
          type: ["string", "null"]
        stakeholders:
          type: ["string", "null"]
        processMap:
          type: ["string", "null"]
        risksAndOpportunities:
          type: ["string", "null"]
        qualityObjectives:
          type: ["string", "null"]
        recommendations:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # DOCUMENT SCHEMAS
    Document:
      type: object
      required: [id, companyId, standardId, type, title, version, status, createdAt]
      properties:
        id:
          type: string
        companyId:
          type: string
        standardId:
          type: string
        standardCode:
          type: ["string", "null"]
        type:
          type: string
          enum: [manual, procedimento, registro, formulario, externo]
        title:
          type: string
        content:
          type: ["string", "null"]
        version:
          type: string
        status:
          type: string
          enum: [rascunho, em_revisao, aprovado, obsoleto]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DocumentUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [rascunho, em_revisao, aprovado, obsoleto]
        revisionReason:
          type: string

    DocumentRevision:
      type: object
      required: [id, documentId, version, createdAt]
      properties:
        id:
          type: string
        documentId:
          type: string
        version:
          type: string
        content:
          type: ["string", "null"]
        revisionReason:
          type: ["string", "null"]
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    GenerateDocumentsInput:
      type: object
      required: [companyId, standardId]
      properties:
        companyId:
          type: string
        standardId:
          type: string
        diagnosticId:
          type: string
        documentTypes:
          type: array
          items:
            type: string

    JobStatus:
      type: object
      required: [jobId, status]
      properties:
        jobId:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        message:
          type: ["string", "null"]
        progress:
          type: ["integer", "null"]
        totalDocuments:
          type: ["integer", "null"]

    DownloadInput:
      type: object
      required: [format]
      properties:
        format:
          type: string
          enum: [pdf, docx, xlsx]

    DownloadResponse:
      type: object
      required: [url, filename, expiresAt]
      properties:
        url:
          type: string
        filename:
          type: string
        expiresAt:
          type: string
          format: date-time

    # CHAT SCHEMAS
    ChatMessageInput:
      type: object
      required: [content, companyId]
      properties:
        content:
          type: string
        companyId:
          type: string
        conversationId:
          type: string

    ChatMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        companyId:
          type: ["string", "null"]
        conversationId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # DASHBOARD SCHEMAS
    DashboardSummary:
      type: object
      required: [totalDocuments, approvedDocuments, pendingDocuments, selectedStandards, lastDiagnosticDate]
      properties:
        totalDocuments:
          type: integer
        approvedDocuments:
          type: integer
        pendingDocuments:
          type: integer
        draftDocuments:
          type: integer
        selectedStandards:
          type: integer
        lastDiagnosticDate:
          type: ["string", "null"]
        complianceScore:
          type: ["integer", "null"]

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        resourceId:
          type: ["string", "null"]
        resourceType:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    DocumentStat:
      type: object
      required: [standardCode, standardName, total, approved, pending]
      properties:
        standardCode:
          type: string
        standardName:
          type: string
        total:
          type: integer
        approved:
          type: integer
        pending:
          type: integer
        draft:
          type: integer

    # AUDIT SCHEMAS
    AuditLog:
      type: object
      required: [id, action, createdAt]
      properties:
        id:
          type: string
        userId:
          type: ["string", "null"]
        userName:
          type: ["string", "null"]
        companyId:
          type: ["string", "null"]
        action:
          type: string
        resourceType:
          type: ["string", "null"]
        resourceId:
          type: ["string", "null"]
        ipAddress:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
