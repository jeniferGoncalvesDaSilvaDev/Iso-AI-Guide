kind = "web"
previewPath = "/"
title = "ISO Gestão IA"
version = "1.0.0"
id = "artifacts/iso-saas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25870

[services.development]
run = "pnpm --filter @workspace/iso-saas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iso-saas", "run", "build" ]
publicDir = "artifacts/iso-saas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25870"
BASE_PATH = "/"
